name: Robot Framework Tests

on:
  push:
    branches: [JJ, develop]
  pull_request:
    branches: [JJ]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run smoke tests
        run: robot --outputdir results --variable BROWSER:headlesschrome tests/smoke/
        env:
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results-smoke
          path: results/
          retention-days: 14

  regression:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run regression tests
        run: robot --outputdir results --variable BROWSER:headlesschrome tests/regression/
        env:
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results-regression
          path: results/
          retention-days: 14


     